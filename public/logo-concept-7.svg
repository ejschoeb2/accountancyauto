<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 7: "Megaphone Clock" — Megaphone with clock face in the horn opening -->
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
  <!-- Megaphone body — based on Lucide megaphone but adjusted to leave room for clock -->
  <path d="M11 6a13 13 0 0 0 8.4-2.8A1 1 0 0 1 21 4v12a1 1 0 0 1-1.6.8A13 13 0 0 0 11 14H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"/>
  <!-- Handle divider -->
  <path d="M8 6v8"/>
  <!-- Drip / leg from megaphone bottom -->
  <path d="M6 14a12 12 0 0 0 2.4 7.2 2 2 0 0 0 3.2-2.4A8 8 0 0 1 10 14"/>
  <!-- Clock face embedded in the horn mouth area -->
  <circle cx="17" cy="10" r="2.5" stroke-width="1.5"/>
  <!-- Clock hands — hour pointing to ~10, minute pointing to 12 -->
  <path d="M17 8.5v1.5l-1 .75" stroke-width="1.5"/>
  <!-- Small tick marks at 12, 3, 6, 9 o'clock -->
  <line x1="17" y1="7.7" x2="17" y2="8" stroke-width="1"/>
  <line x1="19.3" y1="10" x2="19" y2="10" stroke-width="1"/>
  <line x1="17" y1="12.3" x2="17" y2="12" stroke-width="1"/>
  <line x1="14.7" y1="10" x2="15" y2="10" stroke-width="1"/>
</svg>
