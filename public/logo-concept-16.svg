<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 16: "Envelope Brain" — Envelope where the flap traces a brain-like curve -->
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
  <!-- Envelope body -->
  <rect x="2" y="6" width="20" height="14" rx="2"/>
  <!-- Standard envelope flap line going to center -->
  <path d="M2 8l8.91 5.727a2 2 0 0 0 2.18 0L22 8"/>
  <!-- Brain-like lobes on top of the envelope — forms the "smart" flap -->
  <!-- Left hemisphere bumps -->
  <path d="M7.5 6c0-1.5 1-3 2.5-3 1 0 1.8.7 2 1.5" stroke-width="1.8"/>
  <path d="M7.5 6c-1.5 0-2.5-1-2.5-2.2 0-1 .8-1.8 1.8-1.8.7 0 1.3.3 1.7.8" stroke-width="1.5"/>
  <!-- Right hemisphere bumps -->
  <path d="M16.5 6c0-1.5-1-3-2.5-3-1 0-1.8.7-2 1.5" stroke-width="1.8"/>
  <path d="M16.5 6c1.5 0 2.5-1 2.5-2.2 0-1-.8-1.8-1.8-1.8-.7 0-1.3.3-1.7.8" stroke-width="1.5"/>
  <!-- Center stem between hemispheres -->
  <line x1="12" y1="3" x2="12" y2="6" stroke-width="1.5"/>
  <!-- Subtle synapse dots -->
  <circle cx="9" cy="3.5" r="0.5" fill="currentColor" stroke="none"/>
  <circle cx="15" cy="3.5" r="0.5" fill="currentColor" stroke="none"/>
</svg>
