<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 1: "Smart Bell" — A notification bell with a subtle brain/circuit motif -->
<!-- Represents: intelligent reminders, automated prompting -->
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
  <!-- Bell body -->
  <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
  <!-- Clapper -->
  <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
  <!-- Neural dots on the bell surface — intelligence indicator -->
  <circle cx="12" cy="7" r="0.5" fill="currentColor" stroke="none"/>
  <circle cx="10" cy="10" r="0.5" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="10" r="0.5" fill="currentColor" stroke="none"/>
  <!-- Tiny connecting lines (circuit/synapse) -->
  <path d="M12 7.5 L10.3 9.5" stroke-width="1"/>
  <path d="M12 7.5 L13.7 9.5" stroke-width="1"/>
</svg>
