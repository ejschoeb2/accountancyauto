<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 4: "Speech Calendar" — A speech bubble merged with a calendar -->
<!-- Represents: prompting/communication + deadlines/scheduling -->
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded speech bubble shape with calendar vibe -->
  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  <!-- Calendar-style horizontal line -->
  <line x1="3" y1="8" x2="21" y2="8"/>
  <!-- Calendar pin marks on top -->
  <line x1="8" y1="3" x2="8" y2="5.5"/>
  <line x1="16" y1="3" x2="16" y2="5.5"/>
  <!-- Checkmark inside — task complete -->
  <polyline points="9 12 11 14 15 10"/>
</svg>
