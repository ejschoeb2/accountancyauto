<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept 15: "Bell Sparkle" — Notification bell with sparkle/star accents -->
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
  <!-- Bell body — Lucide bell shape -->
  <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>
  <!-- Clapper -->
  <path d="M10.268 21a2 2 0 0 0 3.464 0"/>
  <!-- Main sparkle — 4-pointed star, top-right of bell -->
  <path d="M20 2.5 l0.75 1.75 1.75 0.75 -1.75 0.75 -0.75 1.75 -0.75-1.75 -1.75-0.75 1.75-0.75z" stroke-width="1.5" fill="currentColor"/>
  <!-- Small sparkle accent — left side -->
  <path d="M3 4 l0.4 0.9 0.9 0.4 -0.9 0.4 -0.4 0.9 -0.4-0.9 -0.9-0.4 0.9-0.4z" stroke-width="1" fill="currentColor"/>
  <!-- Tiny dot sparkle -->
  <circle cx="7" cy="2.5" r="0.7" fill="currentColor" stroke="none"/>
</svg>
